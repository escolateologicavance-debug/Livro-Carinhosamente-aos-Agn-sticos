<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sumário</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Georgia, serif;
      background: #000;
      color: #fff;
      line-height: 1.6;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .item {
      margin: 15px 0;
      padding: 15px;
      border-radius: 10px;
      background: #111;
      cursor: pointer;
      transition: 0.3s;
    }

    .item:hover {
      background: #222;
      transform: scale(1.02);
    }

    .numero {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
      color: #aaa;
    }

    #btnAudio {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 30px;
      background: #fff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-voltar {
      display: block;
      margin: 30px auto;
      padding: 10px 18px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Sumário</h1>

  <div id="conteudo">

    <div class="item" onclick="abrir('3.html')">
      <span class="numero">1</span>
      Prometa que você não procura só comodismo no Agnosticismo
    </div>

    <div class="item" onclick="abrir('4.html')">
      <span class="numero">2</span>
      Você pode não crer no Jesus da História, mas não pode negar a história de Jesus
    </div>

    <div class="item" onclick="abrir('5.html')">
      <span class="numero">3</span>
      Agnóstico, por onde anda a tua fé?
    </div>

    <div class="item" onclick="abrir('6.html')">
      <span class="numero">4</span>
      Será que basta simplesmente crer em Deu? 
    </div>

    <div class="item" onclick="abrir('7.html')">
      <span class="numero">5</span>
     E se hoje te pedirem tua alma?
    </div>

    <div class="item" onclick="abrir('8.html')">
      <span class="numero">6</span>
      Sobre o Autor
    </div>

  </div>

  <button id="btnAudio" onclick="toggleAudio()">▶ Ouvir</button>

  <button class="btn-voltar" onclick="voltar()">Voltar</button>

  <script>
    let falando = false;
    let utterance;

    function toggleAudio() {
      const btn = document.getElementById("btnAudio");
      const texto = document.getElementById("conteudo").innerText;

      if (!falando) {
        utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = "pt-BR";

        utterance.onend = () => {
          falando = false;
          btn.innerText = "▶ Ouvir";
        };

        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);

        falando = true;
        btn.innerText = "⏹ Parar";

      } else {
        speechSynthesis.cancel();
        falando = false;
        btn.innerText = "▶ Ouvir";
      }
    }

    function abrir(pagina) {
      window.location.href = pagina;
    }

    function voltar() {
      window.location.href = "1.html";
    }
  </script>

  <!-- VLibras -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>

  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>

</body>
</html>
